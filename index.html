<style>

  /* Executive palette: deep navy ink, steel-blue accent, muted status colors */

  --navy:#16324f;--navy2:#1f4568;--accent:#2e6da4;--accent2:#4a89c8;
  --good:#2e7d5b;--mid:#b07d2b;--bad:#b04a4a;--neutral:#8a94a3;
  --shadow:0 4px 18px rgba(22,50,79,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);}
.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px}
header.top{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;
  background:var(--navy);
  color:#fff;border-radius:14px;padding:22px 26px;box-shadow:var(--shadow);}
header.top h1{margin:0;font-size:21px;letter-spacing:.2px;font-weight:700}
header.top p{margin:6px 0 0;opacity:.85;font-size:13.5px}
.rightctrls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.reload{border:0;cursor:pointer;background:rgba(255,255,255,.14);color:#fff;font-weight:700;font-size:13px;padding:9px 14px;border-radius:9px}
.reload:hover{background:rgba(255,255,255,.26)}
.lang{display:flex;gap:6px;background:rgba(255,255,255,.12);padding:5px;border-radius:10px}
.lang button{border:0;cursor:pointer;padding:8px 16px;border-radius:7px;font-weight:700;font-size:13px;background:transparent;color:#fff;transition:.15s;}
.lang button.active{background:#fff;color:var(--navy)}
.disclaimer{display:flex;gap:12px;align-items:flex-start;background:#fdf6e8;border:1px solid #ecd9ad;
  color:#6b5117;border-radius:12px;padding:14px 18px;margin-top:16px;font-size:13px;line-height:1.55}
.disclaimer .ic{font-size:16px;line-height:1.3}
.disclaimer a{color:#8a6a1e;font-weight:700}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:18px 0 4px}
.kpi{background:var(--card);border-radius:12px;padding:18px 18px 16px;box-shadow:var(--shadow);border-top:3px solid var(--accent)}
.kpi .val{font-size:29px;font-weight:800;line-height:1.05;color:var(--navy)}
.kpi .lab{color:var(--muted);font-size:13px;margin-top:6px}
.kpi .sub{font-size:12px;margin-top:8px;font-weight:600;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-top:18px}
.card h2{margin:0 0 4px;font-size:16px;color:var(--navy)}
.card .hint{color:var(--muted);font-size:12.5px;margin:0 0 14px}
.chartbox{position:relative;height:340px}
.chartbox.tall{height:430px}
select,input[type=text]{width:100%;padding:12px 14px;border-radius:9px;border:1.5px solid var(--line);font-size:14px;color:var(--ink);background:#fff;outline:none;}
select:focus,input:focus{border-color:var(--accent)}
.spot{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px}
.spotcard{border-radius:10px;padding:16px;color:#fff}
.spotcard .n{font-size:25px;font-weight:800}
.spotcard .t{font-size:12.5px;opacity:.9;margin-top:4px}
.spot .s1{background:var(--navy)}
.spot .s2{background:var(--navy2)}
.spot .s3{background:var(--accent)}
.spot .s4{background:var(--accent2)}
.spotmeta{margin-top:14px;display:flex;flex-wrap:wrap;gap:10px 22px;font-size:13.5px;color:var(--muted)}
.spotmeta b{color:var(--ink)}
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px}
.controls .search{flex:1;min-width:220px}
.tablewrap{overflow:auto;border-radius:10px;border:1px solid var(--line)}
table{border-collapse:collapse;width:100%;font-size:13px;min-width:700px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{background:#f7f9fc;position:sticky;top:0;cursor:pointer;user-select:none;font-size:12px;color:var(--muted);z-index:1}
th:hover{color:var(--accent)}
td.name{white-space:normal;min-width:280px;font-weight:600}
td.num{text-align:right;font-variant-numeric:tabular-nums}
td.reg{color:var(--muted);font-size:12.5px}
tr:hover td{background:#f7f9fc}
.pill{display:inline-block;min-width:64px;text-align:center;padding:4px 8px;border-radius:6px;color:#fff;font-weight:700;font-size:12px}
.note{color:var(--muted);font-size:12px;margin-top:14px;text-align:center}
.loading{padding:60px;text-align:center;color:var(--muted);font-size:15px}
.spinner{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.errbox{background:#fdf1f1;border:1px solid #e8c4c4;color:#7c2f2f;padding:18px 20px;border-radius:10px;line-height:1.55}
.errbox b{color:#9c3535}

@media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.spot{grid-template-columns:repeat(2,1fr)}}

const PUBLISHED_CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1CVX1xx2qx3YJXPhkgeHmhw4dNFIkBxTCFzOHj_RwYaXQBF0GOxIFfWExpeAmvj7Xwn0bZFqAVt9A/pub?output=csv";

/* Refresh_Info tab: official Power BI refresh date, updated automatically */
const META_CSV=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=433329528`;

/* ---------- i18n ---------- */
const T={

  },

    loading:"Деректер жүктелуде…",
    universities:"Университеттер",licenses:"Барлық лицензиялар",activated:"Белсендірілген аккаунттар",

    topTitle:"Белсендіру көшбасшылары",topHint:"Лицензияларды белсендіру пайызы бойынша үздік 12 ЖОО.",
    lowTitle:"Назар аударуды қажет етеді",lowHint:"Белсендіру пайызы ең төмен 12 ЖОО.",
    spotTitle:"Университет профилі",spotHint:"Көрсеткіштері мен рейтингтегі орнын көру үшін ЖОО-ны таңдаңыз.",
    selectPh:"Университетті таңдаңыз…",
    sLic:"Лицензиялар",sStarted:"Бастады",sAct:"Белсендірілді",sPct:"Белсендіру",
    rank:"Ел бойынша орны",of:"ішінде",above:"орташадан жоғары",below:"орташадан төмен",
    region:"Аймақ",district:"Аудан",
    tableTitle:"Барлық университеттер",searchPh:"ЖОО немесе аймақ бойынша іздеу…",
    cRank:"№",cName:"Университет",cRegion:"Аймақ",cLic:"Лицензия",cStarted:"Бастады",cAct:"Белс.",cPct:"Белсендіру %",
    disclaimer:'Деректер Power BI арқылы ChatGPT Edu базасымен синхрондалады және <b>48 сағатқа дейін</b> кешігуі мүмкін. Деректердің соңғы ресми жаңартылған күні <a href="'+POWERBI_URL+'" target="_blank" rel="noopener">Power BI есебінің 3-бетінде</a> көрсетілген.',
    dataAsOf:"Деректердің соңғы жаңартылуы (Power BI)",loadedAt:"Бет жүктелді",
    liveNote:"Деректер бет ашылған сайын автоматты түрде жүктеледі. Жоғарыдағы ⟳ түймесі — жаңарту.",
    pbiLink:"Power BI есебі",
    errTitle:"Деректерді жүктеу мүмкін болмады.",
    errBody:"Дереккөз кестесі интернетте жарияланғанын тексеріңіз (<b>Файл → Интернетте жариялау → CSV</b>) және сілтеме беттің кодындағы <code>PUBLISHED_CSV</code> өрісінде тұрғанына көз жеткізіңіз."
  }
};
const REG={
  "г.Астана":{ru:"г. Астана",kz:"Астана қ."},
  "г.Алматы":{ru:"г. Алматы",kz:"Алматы қ."},
  "г.Шымкент":{ru:"г. Шымкент",kz:"Шымкент қ."},
  "область Абай":{ru:"Абайская обл.",kz:"Абай облысы"},
  "Карагандинская область":{ru:"Карагандинская обл.",kz:"Қарағанды облысы"},
  "Кызылординская область":{ru:"Кызылординская обл.",kz:"Қызылорда облысы"},
  "Актюбинская область":{ru:"Актюбинская обл.",kz:"Ақтөбе облысы"},
  "Западно-Казахстанская область":{ru:"Западно-Казахстанская обл.",kz:"Батыс Қазақстан облысы"},
  "Павлодарская область":{ru:"Павлодарская обл.",kz:"Павлодар облысы"},
  "Алматинская область":{ru:"Алматинская обл.",kz:"Алматы облысы"},
  "область Ұлытау":{ru:"Улытауская обл.",kz:"Ұлытау облысы"},
  "Жамбылская область":{ru:"Жамбылская обл.",kz:"Жамбыл облысы"},
  "Костанайская область":{ru:"Костанайская обл.",kz:"Қостанай облысы"},
  "Мангистауская область":{ru:"Мангистауская обл.",kz:"Маңғыстау облысы"},
  "Акмолинская область":{ru:"Акмолинская обл.",kz:"Ақмола облысы"},
  "Восточно-Казахстанская область":{ru:"Восточно-Казахстанская обл.",kz:"Шығыс Қазақстан облысы"},
  "Северо-Казахстанская область":{ru:"Северо-Казахстанская обл.",kz:"Солтүстік Қазақстан облысы"},
  "область Жетісу":{ru:"Жетысуская обл.",kz:"Жетісу облысы"},
  "Атырауская область":{ru:"Атырауская обл.",kz:"Атырау облысы"},
  "Туркестанская область":{ru:"Туркестанская обл.",kz:"Түркістан облысы"}
};
function regName(r,l){const k=(r||"").trim();return REG[k]?REG[k][l]:(k||"—");}

let LANG="ru", DATA=[], NAT={}, sortKey="pct", sortDir=-1, charts={}, lastUpdated=null, dataDate=null;

/* ---------- CSV parsing ---------- */
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{ if(ch==='"')q=true; else if(ch===','){row.push(cur);cur="";}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else if(ch==='\r'){} else cur+=ch; }
  }
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function num(s){if(s==null)return 0;const v=parseFloat(String(s).replace(/[^0-9.\-]/g,""));return isNaN(v)?0:v;}
function buildRows(cells2d){
  const rows=[];dataDate=null;
  /* detect column positions from the header row; fall back to legacy layout */
  let iLic=4,iStart=7,iAct=8;
  const hdr=cells2d.find(c=>c&&c.some(x=>/started|бастады/i.test(x||""))&&c.some(x=>/activated|белсенд/i.test(x||"")));
  if(hdr){
    const f=(re,d)=>{const i=hdr.findIndex(x=>re.test(x||""));return i<0?d:i;};
    iLic=f(/лицензия|license/i,4);iStart=f(/started|бастады/i,7);iAct=f(/activated|белсенд/i,8);
  }
  const need=Math.max(iLic,iStart,iAct)+1;
  cells2d.forEach(c=>{
    if(!c||!c.length)return;
    const first=(c[0]||"").trim();
    if(/обновлен|updated|жаңартыл/i.test(first)&&c[1]){dataDate=(c[1]||"").trim();return;}
    if(c.length<need)return;
    if(!/^\d+$/.test(first))return;           // skip header + totals + blanks
    const licenses=num(c[iLic]),started=num(c[iStart]),activated=num(c[iAct]);
    if(licenses<=0)return;
    /* NOTE: contact names / phone numbers / notes are intentionally NOT read */
    rows.push({id:+first,name:(c[1]||"—").trim(),region:(c[2]||"").trim(),district:(c[3]||"").trim(),
      licenses,started,activated,
      pct:licenses>0?activated/licenses*100:0});
  });
  rows.sort((a,b)=>b.pct-a.pct);
  rows.forEach((r,i)=>r.rank=i+1);
  return rows;
}
function computeNational(){
  const lic=DATA.reduce((s,r)=>s+r.licenses,0);
  const act=DATA.reduce((s,r)=>s+r.activated,0);
  const st=DATA.reduce((s,r)=>s+r.started,0);
  const avg=DATA.length?DATA.reduce((s,r)=>s+r.pct,0)/DATA.length:0;
  NAT={lic,act,started:st,pctWeighted:lic>0?act/lic*100:0,pctAvg:avg};
}

/* ---------- data load ---------- */
async function loadData(){
  const btn=document.getElementById("reloadBtn"); if(btn)btn.textContent="…";
  document.getElementById("app").innerHTML='<div class="loading"><div class="spinner"></div><span>'+T[LANG].loading+'</span></div>';
  let text=null,lastErr=null;
  for(const url of ENDPOINTS){
    try{ const res=await fetch(url,{cache:"no-store"}); if(!res.ok)throw new Error("HTTP "+res.status);
      const t=await res.text();
      if(t && t.trim().length && !/^<!DOCTYPE|^<html/i.test(t.trim())){ text=t; break; }
      lastErr=new Error("Non-CSV response");
    }catch(e){ lastErr=e; }
  }
  if(btn)btn.textContent="⟳";
  if(!text){ showError(lastErr); return; }
  DATA=buildRows(parseCSV(text));
  if(!DATA.length){ showError(new Error("No rows parsed")); return; }
  computeNational(); lastUpdated=new Date();
  await loadMeta();
  render();
}
/* pull the official Power BI refresh date from the Refresh_Info tab (non-fatal) */
async function loadMeta(){
  try{
    const res=await fetch(META_CSV,{cache:"no-store"});
    if(!res.ok)return;
    const rows=parseCSV(await res.text());
    for(const r of rows){
      if(!r||!r.length)continue;
      if(/power\s*bi/i.test(r[0]||"")){
        const v=r.slice(1).find(x=>x&&x.trim());
        if(v){dataDate=v.trim();return;}
      }
    }
  }catch(e){/* keep dataDate from data sheet or null */}
}
function showError(e){
  const t=T[LANG];
  document.getElementById("app").innerHTML='<div class="card"><div class="errbox"><b>⚠️ '+t.errTitle+'</b><br>'+t.errBody+
    '<br><br><small>'+(e&&e.message?e.message:e)+'</small></div></div>';
  document.getElementById("srcbar").innerHTML='';
}

/* muted, professional status scale */
function pctColor(p){if(p<10)return"#b04a4a";if(p<25)return"#c07f35";if(p<50)return"#a3913a";if(p<75)return"#4d7f6e";return"#2e7d5b";}
const fmt=n=>n.toLocaleString(LANG==="kz"?"kk-KZ":"ru-RU");

function setLang(l){LANG=l;document.querySelectorAll(".lang button").forEach(b=>b.classList.toggle("active",b.dataset.l===l));document.documentElement.lang=l==="kz"?"kk":"ru";headerText();if(DATA.length)render();}
function headerText(){
  const t=T[LANG];
  document.getElementById("ttl").textContent=t.title;
  document.getElementById("sub").textContent=t.sub;
  const d=document.getElementById("disc");d.hidden=false;
  document.getElementById("discTxt").innerHTML=t.disclaimer+(dataDate?" · <b>"+t.dataAsOf+": "+dataDate+"</b>":"");
}

function render(){
  headerText();const t=T[LANG];
  document.getElementById("app").innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="val">${fmt(DATA.length)}</div><div class="lab">${t.universities}</div></div>
      <div class="kpi"><div class="val">${fmt(NAT.lic)}</div><div class="lab">${t.licenses}</div><div class="sub">${fmt(NAT.started)} ${t.started}</div></div>
      <div class="kpi"><div class="val">${fmt(NAT.act)}</div><div class="lab">${t.activated}</div></div>
      <div class="kpi"><div class="val">${NAT.pctAvg.toFixed(2)}%</div><div class="lab">${t.national}</div><div class="sub">${t.overallRate}: ${NAT.pctWeighted.toFixed(2)}%</div></div>
    </div>
    <div class="grid2">
      <div class="card"><h2>${t.topTitle}</h2><p class="hint">${t.topHint}</p><div class="chartbox tall"><canvas id="cTop"></canvas></div></div>
      <div class="card"><h2>${t.lowTitle}</h2><p class="hint">${t.lowHint}</p><div class="chartbox tall"><canvas id="cLow"></canvas></div></div>
    </div>
    <div class="card">
      <h2>${t.spotTitle}</h2><p class="hint">${t.spotHint}</p>
      <select id="spotSel" onchange="drawSpot(this.value)"></select>
      <div id="spotOut"></div>
    </div>
    <div class="card">
      <h2>${t.tableTitle}</h2>
      <div class="controls"><div class="search"><input id="q" type="text" placeholder="${t.searchPh}" oninput="drawTable()"></div></div>
      <div class="tablewrap"><table id="tbl"></table></div>
      <div class="note">${t.liveNote}</div>
    </div>`;
  drawRankChart("cTop",DATA.slice(0,12),"#2e7d5b");
  drawRankChart("cLow",DATA.slice(-12),"#b04a4a");
  fillSpotSelect();drawSpot(DATA[0].id);drawTable();
  const up=lastUpdated?lastUpdated.toLocaleString(LANG==="kz"?"kk-KZ":"ru-RU"):"";
  document.getElementById("srcbar").innerHTML=`${t.loadedAt}: ${up} · <a href="${POWERBI_URL}" target="_blank" rel="noopener">${t.pbiLink}</a>`;
}
function shorten(n){return n.length>34?n.slice(0,32)+"…":n;}
function drawRankChart(canvasId,set,color){
  const key=canvasId;
  if(charts[key])charts[key].destroy();
  charts[key]=new Chart(document.getElementById(canvasId),{type:"bar",
    data:{labels:set.map(r=>shorten(r.name)),datasets:[{data:set.map(r=>+r.pct.toFixed(2)),backgroundColor:color,borderRadius:4,barThickness:14}]},
    options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>set[c[0].dataIndex].name,label:c=>c.parsed.x+"% · "+regName(set[c.dataIndex].region,LANG)}}},
      scales:{x:{ticks:{callback:v=>v+"%"},grid:{color:"#eef1f5"}},y:{ticks:{font:{size:10}},grid:{display:false}}}}});
}
function fillSpotSelect(){
  const t=T[LANG];const sel=document.getElementById("spotSel");
  const opts=DATA.slice().sort((a,b)=>a.name.localeCompare(b.name,"ru"));
  sel.innerHTML=`<option disabled>${t.selectPh}</option>`+opts.map(r=>`<option value="${r.id}">${r.name}</option>`).join("");
}
function drawSpot(id){
  const t=T[LANG];const r=DATA.find(x=>x.id==id);if(!r)return;
  document.getElementById("spotSel").value=id;
  const diff=r.pct-NAT.pctAvg;const up=diff>=0;
  document.getElementById("spotOut").innerHTML=`
    <div class="spot">
      <div class="spotcard s1"><div class="n">${fmt(r.licenses)}</div><div class="t">${t.sLic}</div></div>
      <div class="spotcard s2"><div class="n">${fmt(r.started)}</div><div class="t">${t.sStarted}</div></div>
      <div class="spotcard s3"><div class="n">${fmt(r.activated)}</div><div class="t">${t.sAct}</div></div>
      <div class="spotcard s4"><div class="n">${r.pct.toFixed(2)}%</div><div class="t">${t.sPct}</div></div>
    </div>
    <div class="spotmeta">
      <span><b>${r.name}</b></span>
      <span>${t.rank}: <b>#${r.rank}</b> ${t.of} ${DATA.length}</span>
      <span style="color:${up?'var(--good)':'var(--bad)'}"><b>${up?'▲ +':'▼ '}${diff.toFixed(2)} ${LANG==='kz'?'п.т.':'п.п.'}</b> ${up?t.above:t.below}</span>
    </div>
    <div class="spotmeta">
      <span>${t.region}: <b>${regName(r.region,LANG)}</b></span>
      <span>${t.district}: <b>${r.district||'—'}</b></span>
    </div>`;
}
function drawTable(){
  const t=T[LANG];
  const q=(document.getElementById("q").value||"").toLowerCase().trim();
  let rows=DATA.filter(r=>!q||r.name.toLowerCase().includes(q)||regName(r.region,LANG).toLowerCase().includes(q)||regName(r.region,"ru").toLowerCase().includes(q));
  rows=rows.slice().sort((a,b)=>{let v;if(sortKey==="name")v=a.name.localeCompare(b.name,"ru");else if(sortKey==="region")v=regName(a.region,LANG).localeCompare(regName(b.region,LANG),"ru");else v=a[sortKey]-b[sortKey];return v*sortDir;});
  const arrow=k=>sortKey===k?(sortDir===1?" ▲":" ▼"):"";
  const th=(k,lab,cls="")=>`<th class="${cls}" onclick="setSort('${k}')">${lab}${arrow(k)}</th>`;
  let h=`<thead><tr>${th("rank",t.cRank)}${th("name",t.cName)}${th("region",t.cRegion)}${th("licenses",t.cLic,"num")}${th("started",t.cStarted,"num")}${th("activated",t.cAct,"num")}${th("pct",t.cPct,"num")}</tr></thead><tbody>`;
  rows.forEach(r=>{h+=`<tr>
    <td class="num">${r.rank}</td>
    <td class="name">${r.name}</td>
    <td class="reg">${regName(r.region,LANG)}</td>
    <td class="num">${fmt(r.licenses)}</td><td class="num">${fmt(r.started)}</td><td class="num">${fmt(r.activated)}</td>
    <td class="num"><span class="pill" style="background:${pctColor(r.pct)}">${r.pct.toFixed(1)}%</span></td></tr>`;});
  h+="</tbody>";document.getElementById("tbl").innerHTML=h;
}
function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==="name"||k==="region")?1:-1;}drawTable();}

headerText();loadData();
</script>
</body>
</html>
